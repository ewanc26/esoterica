# Morphological profiles defining affixation patterns and noun class systems.

[agglutinative]
# Concatenative suffixes, one morpheme per grammatical function (e.g. Turkish, Finnish)
rules = [
    { suffix = "-en" },
    { suffix = "-is" }
]
noun_classes = ["animate", "inanimate"]

[fusional]
# Single affix encodes multiple grammatical categories (e.g. Latin, Russian)
rules = [
    { suffix = "-a" },
    { suffix = "-o" }
]
noun_classes = ["masculine", "feminine", "neuter"]

[analytic]
# Minimal inflection, word order does the work (e.g. Mandarin, English)
rules = [
    { prefix = "pre-" }
]

[polysynthetic]
# Heavy affixation stacking, often incorporating multiple roots (e.g. Inuktitut)
rules = [
    { prefix = "ti-" },
    { suffix = "-ya" },
    { infix = "-ka-" }
]
noun_classes = ["animate", "inanimate", "abstract"]
