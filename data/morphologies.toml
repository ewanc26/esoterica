[agglutinative]
rules = [
    { suffix = "-en" },
    { suffix = "-is" }
]
noun_classes = ["animate", "inanimate"]

[fusional]
rules = [
    { suffix = "-a" },
    { suffix = "-o" }
]
noun_classes = ["masculine", "feminine", "neuter"]

[analytic]
rules = [
    { prefix = "pre-" }
]

[polysynthetic]
rules = [
    { prefix = "ti-" },
    { suffix = "-ya" },
    { infix = "-ka-" }
]
noun_classes = ["animate", "inanimate", "abstract"]
