# Phoneme inventories organised by language family/area.
# Each entry defines vowels, consonants, syllable structure, tone, and vowel harmony.

[eurasia_ie_germanic]
# Indo-European, Germanic branch — large consonant clusters (CCCVCCCC)
vowels = ["a", "e", "i", "o", "u"]
consonants = ["p", "b", "t", "d", "k", "g", "f", "s", "h", "m", "n", "r", "l"]
syllable_structure = "CCCVCCCC"
vowel_harmony = false

[eurasia_ie_romance]
# Indo-European, Romance branch — simple (C)V structure
vowels = ["a", "e", "i", "o", "u"]
consonants = ["p", "b", "t", "d", "k", "g", "f", "v", "s", "z", "m", "n", "r", "l"]
syllable_structure = "CV"
vowel_harmony = false

[africa_afroasiatic_semitic]
# Afro-Asiatic, Semitic branch — small vowel inventory, uvular stops, CVC
vowels = ["a", "i", "u"]
consonants = ["q", "k", "g", "t", "d", "s", "z", "sh", "h", "m", "n", "r", "l"]
syllable_structure = "CVC"
vowel_harmony = false

[africa_nigercongo_bantu]
# Niger-Congo, Bantu branch — open syllables, vowel harmony (e.g. Swahili)
vowels = ["a", "e", "i", "o", "u"]
consonants = ["p", "b", "t", "d", "k", "g", "m", "n", "s", "z"]
syllable_structure = "CV"
vowel_harmony = true

[asia_sinotibetan_sinitic]
# Sino-Tibetan, Sinitic branch — tonal, limited syllable codas
vowels = ["a", "e", "i", "o", "u"]
consonants = ["p", "t", "k", "s", "h", "m", "n", "ng", "l"]
syllable_structure = "CV"
tones = 4
vowel_harmony = false

[americas_utoaztecan]
# Uto-Aztecan — vowel harmony, labialised velars, CVC structure
vowels = ["a", "i", "u", "o"]
consonants = ["p", "t", "k", "kw", "s", "h", "m", "n", "w", "j"]
syllable_structure = "CVC"
vowel_harmony = true

[oceania_austronesian]
# Austronesian — small inventories, open syllables
vowels = ["a", "i", "u"]
consonants = ["p", "t", "k", "s", "h", "m", "n", "ng", "l", "r"]
syllable_structure = "CV"
vowel_harmony = false

[uralic_finnic]
# Uralic, Finnic branch — large vowel inventory with front/back harmony (Finnish/Hungarian style)
vowels = ["a", "e", "i", "o", "u", "ä", "ö", "y"]
consonants = ["p", "t", "k", "s", "h", "m", "n", "r", "l", "v", "j"]
syllable_structure = "CVC"
vowel_harmony = true
